<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaunchPard — You're Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #080c15 0%, #0f1419 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #a0aec0;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    button {
      padding: 0.875rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #5558e3 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-secondary {
      background: rgba(99, 102, 241, 0.1);
      color: #6366f1;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .info-box {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #cbd5e0;
    }

    .info-icon {
      margin-right: 0.5rem;
    }

    .status {
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      transition: all 0.3s ease;
    }

    .status.checking {
      background: rgba(251, 191, 36, 0.1);
      color: #fbbf24;
    }

    .status.online {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
    }

    .status.offline {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚀</div>
    <h1>You're offline</h1>
    <p class="subtitle">But you can still learn! Check your connection or visit the dashboard to use cached lessons.</p>

    <div class="buttons">
      <button class="btn-primary" onclick="checkConnection()">Check Connection</button>
      <button class="btn-secondary" onclick="goToDashboard()">Go to Dashboard</button>
    </div>

    <div class="status offline" id="status">
      <span class="info-icon">📡</span>
      <span id="status-text">No internet connection detected</span>
    </div>

    <div class="info-box">
      <p><span class="info-icon">💡</span> Tip: Cached questions will load once you're back online. Keep learning!</p>
    </div>
  </div>

  <script>
    // Check connection status
    function updateConnectionStatus() {
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('status-text');

      if (navigator.onLine) {
        statusEl.className = 'status online';
        statusText.textContent = '✓ You\'re back online! Syncing your progress...';
        setTimeout(() => {
          window.location.href = '/dashboard/student';
        }, 1500);
      } else {
        statusEl.className = 'status offline';
        statusText.textContent = '✗ Still offline. Try again in a moment.';
      }
    }

    function checkConnection() {
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('status-text');

      statusEl.className = 'status checking';
      statusText.textContent = 'Checking connection...';

      // Try to fetch a small resource to verify connectivity
      fetch('/manifest.json', { method: 'HEAD' })
        .then(() => {
          updateConnectionStatus();
        })
        .catch(() => {
          statusEl.className = 'status offline';
          statusText.textContent = '✗ Still offline. You can still practice with cached lessons.';
        });
    }

    function goToDashboard() {
      // Try to go to dashboard; if offline, the SW will serve cached version
      window.location.href = '/dashboard/student';
    }

    // Listen for online event
    window.addEventListener('online', () => {
      updateConnectionStatus();
    });

    window.addEventListener('offline', () => {
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('status-text');
      statusEl.className = 'status offline';
      statusText.textContent = '✗ Connection lost';
    });

    // Initial status check
    updateConnectionStatus();
  </script>
</body>
</html>
