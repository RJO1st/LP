<svg width="10mm" height="10mm" viewBox="0 0 10 10" version="1.1" xmlns="http://www.w3.org/2000/svg">
<title>GCLCOutputFigure</title>

<!-- Changing color 0 80 180 -->

<!-- Drawing segment A B -->
<line x1="1.00" y1="8.00" x2="9.00" y2="8.00" style="stroke:#0050B4; stroke-width:2.00"></line>

<!-- Drawing segment B C -->
<line x1="9.00" y1="8.00" x2="7.00" y2="3.00" style="stroke:#0050B4; stroke-width:2.00"></line>

<!-- Drawing segment C D -->
<line x1="7.00" y1="3.00" x2="3.00" y2="3.00" style="stroke:#0050B4; stroke-width:2.00"></line>

<!-- Drawing segment D A -->
<line x1="3.00" y1="3.00" x2="1.00" y2="8.00" style="stroke:#0050B4; stroke-width:2.00"></line>

<!-- Changing color 180 0 0 -->

<!-- Drawing segment H1 H2 -->
<line x1="4.00" y1="8.00" x2="4.00" y2="6.50" style="stroke:#B40000; stroke-width:1.00"></line>
<line x1="4.00" y1="5.75" x2="4.00" y2="4.25" style="stroke:#B40000; stroke-width:1.00"></line>
<line x1="4.00" y1="3.50" x2="4.00" y2="3.00" style="stroke:#B40000; stroke-width:1.00"></line>

<!-- Changing color 0 0 0 -->

<!-- Drawing segment RaL RaC -->
<line x1="3.58" y1="8.00" x2="3.58" y2="7.50" style="stroke:#000000; stroke-width:1.00"></line>

<!-- Drawing segment RaU RaC -->
<line x1="4.00" y1="7.50" x2="3.58" y2="7.50" style="stroke:#000000; stroke-width:1.00"></line>

<!-- Changing color 0 0 0 -->

<!-- Printing text at point Tb -->
<text x="5.00" y="9.50" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle" dy="4.569420"> b </text>

<!-- Printing text at point Ta -->
<text x="5.00" y="1.40" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle"> a </text>

<!-- Printing text at point Th -->
<text x="5.70" y="5.50" style="font-size:4.57pt; font-style:italic; fill:#000000" dy="2.108963"> h </text>

<!-- Printing text at point Tf -->
<text x="5.00" y="0.50" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle"> Area = (a+b) x h / 2 </text>
</svg>