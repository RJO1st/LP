<svg width="10mm" height="10mm" viewBox="0 0 10 10" version="1.1" xmlns="http://www.w3.org/2000/svg">
<title>GCLCOutputFigure</title>

<!-- Changing color 0 60 180 -->

<!-- Drawing segment A B -->
<line x1="4.00" y1="6.00" x2="8.00" y2="6.00" style="stroke:#003CB4; stroke-width:2.00"></line>

<!-- Drawing segment B C -->
<line x1="8.00" y1="6.00" x2="4.00" y2="2.00" style="stroke:#003CB4; stroke-width:2.00"></line>

<!-- Drawing segment C A -->
<line x1="4.00" y1="2.00" x2="4.00" y2="6.00" style="stroke:#003CB4; stroke-width:2.00"></line>

<!-- Changing color 0 0 0 -->

<!-- Drawing segment RaV RaC -->
<line x1="4.00" y1="5.52" x2="4.48" y2="5.52" style="stroke:#000000; stroke-width:1.00"></line>

<!-- Drawing segment RaH RaC -->
<line x1="4.48" y1="6.00" x2="4.48" y2="5.52" style="stroke:#000000; stroke-width:1.00"></line>

<!-- Changing color 200 0 0 -->

<!-- Drawing segment A A1 -->
<line x1="4.00" y1="6.00" x2="4.00" y2="8.50" style="stroke:#C80000; stroke-width:1.00"></line>

<!-- Drawing segment A1 A2 -->
<line x1="4.00" y1="8.50" x2="8.00" y2="8.50" style="stroke:#C80000; stroke-width:1.00"></line>

<!-- Drawing segment A2 B -->
<line x1="8.00" y1="8.50" x2="8.00" y2="6.00" style="stroke:#C80000; stroke-width:1.00"></line>

<!-- Changing color 0 140 0 -->

<!-- Drawing segment A C1 -->
<line x1="4.00" y1="6.00" x2="1.50" y2="6.00" style="stroke:#008C00; stroke-width:1.00"></line>

<!-- Drawing segment C1 C2 -->
<line x1="1.50" y1="6.00" x2="1.50" y2="2.00" style="stroke:#008C00; stroke-width:1.00"></line>

<!-- Drawing segment C2 C -->
<line x1="1.50" y1="2.00" x2="4.00" y2="2.00" style="stroke:#008C00; stroke-width:1.00"></line>

<!-- Changing color 0 0 0 -->

<!-- Printing text at point T1 -->
<text x="6.00" y="8.50" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle" dy="4.569420"> a^2 </text>

<!-- Printing text at point T2 -->
<text x="1.50" y="4.00" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="end" dy="2.108963"> b^2 </text>

<!-- Printing text at point T3 -->
<text x="7.20" y="4.20" style="font-size:4.57pt; font-style:italic; fill:#000000" dy="4.569420"> c </text>

<!-- Printing text at point T4 -->
<text x="6.20" y="4.70" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle"> a </text>

<!-- Printing text at point T5 -->
<text x="4.80" y="4.00" style="font-size:4.57pt; font-style:italic; fill:#000000" dy="2.108963"> b </text>

<!-- Printing text at point T6 -->
<text x="5.50" y="0.50" style="font-size:4.57pt; font-style:italic; fill:#000000" text-anchor="middle"> a^2+b^2=c^2 </text>
</svg>