<svg width="10mm" height="10mm" viewBox="0 0 10 10" version="1.1" xmlns="http://www.w3.org/2000/svg">
<title>GCLCOutputFigure</title>

<!-- Changing color 180 180 180 -->

<!-- Drawing segment XL XR -->
<line x1="0.30" y1="5.00" x2="9.70" y2="5.00" style="stroke:#B4B4B4; stroke-width:1.00"></line>

<!-- Drawing segment YB YT -->
<line x1="5.00" y1="9.70" x2="5.00" y2="0.30" style="stroke:#B4B4B4; stroke-width:1.00"></line>

<!-- Changing color 180 180 180 -->

<!-- Printing text at point Tor -->
<text x="6.00" y="6.10" style="font-size:4.22pt; font-style:italic; fill:#B4B4B4" dy="4.217926"> O </text>

<!-- Changing color 0 80 200 -->

<!-- Drawing segment A B -->
<line x1="6.00" y1="4.00" x2="8.00" y2="4.00" style="stroke:#0050C8; stroke-width:2.00"></line>

<!-- Drawing segment B C -->
<line x1="8.00" y1="4.00" x2="6.00" y2="2.00" style="stroke:#0050C8; stroke-width:2.00"></line>

<!-- Drawing segment C A -->
<line x1="6.00" y1="2.00" x2="6.00" y2="4.00" style="stroke:#0050C8; stroke-width:2.00"></line>

<!-- Printing text at point Tobj -->
<text x="8.20" y="5.20" style="font-size:4.22pt; font-style:italic; fill:#0050C8" dy="4.217926"> Object </text>

<!-- Changing color 200 0 0 -->

<!-- Drawing segment Ar Br -->
<line x1="4.00" y1="4.00" x2="4.00" y2="2.00" style="stroke:#C80000; stroke-width:2.00"></line>

<!-- Drawing segment Br Cr -->
<line x1="4.00" y1="2.00" x2="2.00" y2="4.00" style="stroke:#C80000; stroke-width:2.00"></line>

<!-- Drawing segment Cr Ar -->
<line x1="2.00" y1="4.00" x2="4.00" y2="4.00" style="stroke:#C80000; stroke-width:2.00"></line>

<!-- Printing text at point Timg -->
<text x="1.10" y="1.10" style="font-size:4.22pt; font-style:italic; fill:#C80000" text-anchor="end"> Image </text>

<!-- Changing color 0 140 0 -->

<!-- Drawing arc O A 90.00 -->
<path d="M6.00,4.00  a1.41,1.41 0 0,0 -2.00,-0.00" fill="none" stroke="#008C00" stroke-width="1.50"></path>

<!-- Printing text at point Tang -->
<text x="6.90" y="1.80" style="font-size:4.22pt; font-style:italic; fill:#008C00"> 90 deg </text>
</svg>