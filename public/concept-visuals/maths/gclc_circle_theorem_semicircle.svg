<circle cx="1.50" cy="5.00" r="0.40" fill="none" stroke="#000000" stroke-width="1.00"></circle>
<text x="1.50" y="6.00" style="font-size:4.22pt; font-style:italic; fill:#000000" text-anchor="middle" dy="4.217926">A</text>

